project:
  name: vlm_token_compression
  seed: 42

model:
  # Primary model for Colab A100. If this fails, run_benchmark.py tries fallback_model_ids.
  model_id: Qwen/Qwen2.5-VL-3B-Instruct
  fallback_model_ids:
    - Qwen/Qwen2-VL-2B-Instruct
  dtype: bf16            # bf16, fp16, float16, float32, auto
  device_map: auto
  attn_implementation: sdpa
  trust_remote_code: false
  low_cpu_mem_usage: true

generation:
  max_new_tokens: 64
  do_sample: false
  temperature: 0.0

compression:
  # Runnable path: resize images to a lower Qwen visual token budget.
  # Internal hook path: for Qwen2.5-VL fixed-ratio pruning, run the visual encoder,
  # prune image embeddings, rebuild compressed input_ids/inputs_embeds/attention_mask/
  # position_ids, then prefill the LLM with a shorter true sequence.
  apply_proxy_image_budget: true
  enable_internal_hooks: true
  retention_ratios: [1.0, 0.75, 0.5, 0.25, 0.1, 0.05]

image_resolution_tokens:
  # Qwen docs describe visual token budget as pixels / (28 * 28).
  low: 256
  medium: 512
  high: 1024

benchmark:
  methods: [none, fixed, importance, merging]
  retention_ratios: [1.0, 0.75, 0.5, 0.25, 0.1, 0.05]
  image_resolutions: [low, medium, high]
  num_images: [1, 2, 4]
  max_samples: 12
  warmup_runs: 1
  output_csv: results/benchmark_results.csv
  summary_csv: results/summary_results.csv

quality:
  # Stricter than relaxed keyword average: a synthetic VQA sample with multiple
  # target values is correct only if all required values appear in the answer.
  # This makes compression-induced OCR/counting/layout failures visible.
  metric: all_keywords_match
